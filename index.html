<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Vale Jantar & Vinho</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(-45deg, #5f0a0a, #8b0000, #000000, #2b0000);
      background-size: 400% 400%;
      animation: gradient 8s ease infinite;
      color: white;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      padding: 50px 40px;
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      max-width: 420px;
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-weight: 700;
      margin-bottom: 15px;
      font-size: 26px;
    }

    p {
      font-weight: 300;
      margin-bottom: 35px;
      font-size: 15px;
      line-height: 1.6;
      color: #f5f5f5;
    }

    button {
      padding: 14px 28px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(45deg, #ff4d6d, #ff1f4b);
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 8px 20px rgba(255, 31, 75, 0.4);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(255, 31, 75, 0.6);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.6;
    }

  </style>
</head>

<body>

  <div class="card">
    <h1>&#127863; Vale Jantar & Vinho</h1>
    <p>
      Parabéns. Você foi selecionada para uma noite especial com direito
      a vinho, risadas e companhia cuidadosamente escolhida.
    </p>

    <button onclick="resgatar()">Resgatar Agora</button>

    <div class="footer">
      Oferta limitada. Sujeita à disponibilidade do cozinheiro.
    </div>
  </div>

  <script>
    function resgatar() {

      const numero = "5587992049094";

      const mensagem =
        "Oi! Estou resgatando meu Vale Jantar & Vinho. Quando vamos?";

      const url =
        "https://wa.me/" + numero +
        "?text=" + encodeURIComponent(mensagem);

      window.open(url, "_blank");
    }
  </script>

</body>
</html>
