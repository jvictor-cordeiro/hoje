<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Vale Jantar & Vinho</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #8B0000, #000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      max-width: 400px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff1f4b;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🍷 Vale Jantar & Vinho</h1>
    <p>
      Parabéns! Você ganhou um jantar especial com direito a vinho,
      boas risadas e companhia selecionada a dedo.
    </p>

    <button onclick="resgatar()">Resgatar Agora</button>
  </div>

  <script>
    function resgatar() {

      const numero = "5587992049094";

      const mensagem =
        "Oi! Estou resgatando meu Vale Jantar & Vinho 🍷😌 Quando vamos?";

      const url =
        "https://wa.me/" + numero +
        "?text=" + encodeURIComponent(mensagem);

      window.open(url, "_blank");
    }
  </script>

</body>
</html>
